{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Talk Through Signs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
        }
        .maincont{
            margin-top: 10px;
            display: flex;
            align-items: center;
        }
        .feedback-card {
            max-width: 500px;
            margin: auto;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: #ffffff;
            overflow: hidden;
        }
        .header-section {
            background-color: #001f3f; /* Navy Blue */
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        .form-label {
            font-weight: 500;
            color: #4a5568;
        }
        .form-control {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            resize: none;
        }
        .form-control:focus {
            border-color: #001f3f;
            box-shadow: 0 0 0 3px rgba(0, 31, 63, 0.1);
        }
        .btn-submit {
            background-color: #001f3f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #001122;
            transform: translateY(-1px);
            color: white;
        }
    </style>
</head>
<body>

<div class="maincont">
    <div class="container">
    <div class="card feedback-card">
        <div class="header-section">
            <h2 class="mb-1">Feedback</h2>
            <p class="mb-0 opacity-75">We value your thoughts</p>
        </div>
        
        <div class="card-body p-4 p-lg-5">
            <form action="" method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="txt_feedback" class="form-label">How can we improve?</label>
                    <textarea 
                        name="txt_feedback" 
                        id="txt_feedback" 
                        class="form-control" 
                        rows="5" 
                        placeholder="Write your feedback here..." 
                        required></textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-submit">Submit Feedback</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
