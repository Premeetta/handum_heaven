<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DeafUserList</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="3">
            <tr>
                <td>SL NO</td>
                <td>Name</td>
                <td>Photo</td>
                <td>Email</td>
                <td>Address</td>
                <td>District</td>
                <td>Place</td>
                <td>Action</td>
            </tr>
            {% for i in abcd %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.deafuser_name}}</td>
                <td><img src="{{i.deafuser_photo.url}}" width="200" alt=""></td>
                <td>{{i.deafuser_email}}</td>
                <td>{{i.deafuser_address}}</td>
                <td>{{i.place.district.district_name}}</td>
                <td>{{i.place.place_name}}</td>
                <td><a href="{% url 'Admin:acceptdeafuser' i.id %}">accept</a><a href="{% url 'Admin:rejectdeafuser' i.id %}">reject</a></td>

            </tr>
            {% endfor %}
        </table>
    </form>
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:DeafUser' %}"
</script>

{% endif %}
