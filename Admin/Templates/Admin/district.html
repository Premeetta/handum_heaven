<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>district</title>
</head>
<body>
    <form action=""method = "post">
        {% csrf_token %}
        <table border="2">
            <tr>
                <td>District</td>
                <td><input type="text" name="dis_txt" id="" value="{{editData.district_name}}" required></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="add"></td>
            </tr>
        </table>
        <table border="2">
            <tr>
                    <td>no</td>
                    <td>district</td>
                    <td>action</td>
            </tr>
            {% for i in district %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.district_name}}</td>
                <td><a href="{% url 'Admin:delDistrict' i.id %}">Delete</a>
                <a href="{% url 'Admin:editDistrict' i.id %}">Edit</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </form>
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:district' %}"
</script>

{% endif %}
