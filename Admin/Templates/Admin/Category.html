<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>category</title>
</head>
<body>
    <form action=""method = "post">
        {% csrf_token %}
        <table border="3">
            <tr>
                <td>category</td>
                <td><input type="text" name="cat_txt" id="" value="{{editData.category_name}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="add"></td>
            </tr>
        </table>
        <table border="2">
            <tr>
                <td>no</td>
                <td>category</td>
                <td>action</td>
            </tr>
            {% for i in category%}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.category_name}}</td>
               <td><a href="{% url 'Admin:delcatg' i.id %}">Delete</a>
                <a href="{% url 'Admin:editCatg' i.id %}">Edit</a>
                   
            </td>
            </tr>
            {% endfor %}
        </table>
    </form>
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:category' %}"
</script>
{% endif %}
