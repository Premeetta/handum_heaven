<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubCategory</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="2">
            <tr>
                <td>Category</td>
                <td><select name="select_category" id="" >
                <option value="">....select....</option>
                {% for i in categoryData%}
                <option value="{{i.id}}"
                {% if i.id == editsubcategory.category_id %} selected
                {% endif %}
                >{{ i.category_name}}</option>
                {% endfor %}
                </select></td>
            </tr>
            <tr>
                <td>SubCategory</td>
                <td><input type="text" name="sub_txt" id="" value="{{editsubcategory.subcatgory_name}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="submit"></td>
                
            </tr>
        </table>
        <table border="2">
            <tr>
                    <td>no</td>
                    <td>category</td>
                    <td>SubCategory</td>
                    <td>action</td>
            </tr>
            {% for i in subcategoryData %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.category.category_name}}</td>
                <td>{{i.subcatgory_name}}</td>
                <td><a href="{% url 'Admin:delsubcategory' i.id %}">Delete</a></td>
                <td><a href="{% url 'Admin:editsubcategory' i.id %}">Edit </a></td>
            </tr>
            {% endfor %}
        </table>
    </form>
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:SubCategory' %}"
</script>

{% endif %}
