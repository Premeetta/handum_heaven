<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>view complaint</title>
</head>
<body>
     <form action=""method = "post">
        <h1 align="center">View Complaint</h1>
        {% csrf_token %}
        <table border="2" align="center">
            <tr>
                 <td>Sl No</td>
                 <td>User Name</td>
                 <td>Email</td>
                 <td>Title</td>
                 <td>Content</td>
                 <td>Action</td> 
            </tr>
                {% for i in viewData %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.user_id.user_name}}</td>
                <td>{{i.user_id.user_email}}</td>
                <td>{{i.complaint_title}}</td>
                <td>{{i.complaint_content}}</td>
                <td><a href="{% url 'Admin:Reply' i.id %}">Reply</a></td>
           </tr>
           {% endfor %}
        </table>
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:ViewComplaint' %}"
</script>

{% endif %}
