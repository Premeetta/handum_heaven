<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="3">
            <tr>
                <td>Name</td>
                <td><input type="text" name="txt_name" id="" value="{{editData.admin_name}}"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" name="txt_mail" id="" value="{{editData.admin_email}}"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="txt_pass" id="" value="{{editData.admin_pass}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="register"></td>
            </tr>
        </table>
        <table border="2">
            <tr>
                <td>no</td>
                <td>name</td>
                <td>email</td>
                <td>pass</td>
                <td>actions</td>
            </tr>
            {% for i in registration %}

            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.admin_name}}</td>
                <td>{{i.admin_email}}</td>
                <td>{{i.admin_pass}}</td>
                <td><a href="{% url 'Admin:delAdmin' i.id %}">Delete</a>
                    <a href="{% url 'Admin:editAdmin' i.id %}">Edit</a>
                </td>
            </tr>
            {%  endfor %}
        </table>
             
    </form>  
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:AdminRegistration' %}"
</script>
{% endif %}
