<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="3">
            <tr>
                <td>Name</td>
                <td><input type="text" name="txt_name" id="" value="{{data.deafuser_name}}"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" name="mail" id="" value="{{data.deafuser_email}}"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><input type="text" name="txt_address" id="" value="{{data.deafuser_address}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Update"></td>
            </tr>
        </table>
        {% if msg %}
        <script>
            alert("{{msg}}")
            window.location = "{% url 'DeafUser:MyProfile' %}"
        </script>
        {% endif %}
</form></body>
</html>
